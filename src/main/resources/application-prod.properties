# ========================
# 운영 환경 전용 설정 (SPRING_PROFILES_ACTIVE=prod)
# application.properties 위에 덮어씌워짐
# ========================

spring.application.name=ReactRestApIB

# MyBatis
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.nakshi.rohitour.dto

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JPA 공통
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.redirect-uri=https://rohitour.com/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,mobile
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=https://rohitour.com/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=https://rohitour.com/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=profile,email

# DB (Docker 컨테이너 내부 연결)
spring.datasource.url=jdbc:postgresql://postgres:5432/rohitour_db?currentSchema=dbo
spring.datasource.username=${DB_USERNAME:rohitour}
spring.datasource.password=${DB_PASSWORD}

# 쿠키 (HTTPS 운영 환경)
app.cookie.secure=true

# CORS — .env 파일의 APP_CORS_ORIGINS 환경변수로 주입 (예: https://rohitour.co.kr)
app.cors.allowed-origins=${APP_CORS_ORIGINS}

# 업로드 경로
app.upload.base-dir=/data/uploads

# 프론트엔드 URL
app.frontend.url=${APP_FRONTEND_URL}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.show-sql=false

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${GMAIL_USERNAME}

# 로그 — 운영 노이즈 제거
logging.level.org.mybatis=INFO
logging.level.com.nakshi.rohitour.repository=INFO
logging.level.org.springframework.security.oauth2=INFO
logging.level.org.springframework.web.client=INFO
