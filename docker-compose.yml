services:
  postgres:
    image: postgres:15
    container_name: rohitour-db
    environment:
      POSTGRES_DB: rohitour_db
      POSTGRES_USER: ${DB_USERNAME:-rohitour}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - /data/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - rohitour-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rohitour} -d rohitour_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: rohitour-backend
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - /data/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rohitour-net

  frontend:
    build: /app/frontend
    container_name: rohitour-frontend
    restart: unless-stopped
    networks:
      - rohitour-net

  nginx:
    image: nginx:alpine
    container_name: rohitour-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /app/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /data/ssl/cert.pem:/etc/ssl/cert.pem
      - /data/ssl/key.pem:/etc/ssl/key.pem
      - /data/uploads:/data/uploads
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - rohitour-net

networks:
  rohitour-net:
    driver: bridge
